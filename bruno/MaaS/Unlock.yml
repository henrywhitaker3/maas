info:
  name: Unlock
  type: http
  seq: 2

http:
  method: POST
  url: "{{url}}/v1/unlock"
  body:
    type: json
    data: |-
      {
        "subject": "{{subject}}",
        "owner": "{{owner}}"
      }
  auth: inherit

runtime:
  variables:
    - name: owner
      value: 04c43969-3552-4a5b-bd1b-cbcb07aa3d6f
    - name: subject
      value: bongo

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
